<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
    <title>Xyroo AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon circle-logo">
                        <img src="logo.png" alt="Xyroo AI  ">
                    </div>
                    <div class="logo-text">
                        <span class="logo-name">Xyroo AI</span>
                        <span class="logo-tagline">by ryuudev</span>
                    </div>
                </div>
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <button class="new-chat-btn" onclick="newChat()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Chat Baru
            </button>
            
            <div class="sidebar-section">
                <span class="section-title">Riwayat Chat</span>
                <div class="chat-history" id="chatHistory"></div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <span>Guest</span>
                </div>
                <button class="clear-all-btn" onclick="clearAllChats()" title="Hapus semua chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>

            <!-- Support Section -->
            <div class="support-section">
                <p class="support-text">Support Ryuudev</p>
                <a href="https://trakteer.id/ryuu_san2/gift" target="_blank" class="trakteer-link">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                    Trakteer.id
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Mobile Header -->
            <div class="mobile-header">
                <button class="menu-btn" onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="mobile-logo">
                    <div class="mobile-logo-icon circle-logo">
                        <img src="logo.png" alt="Xyroo AI">
                    </div>
                    Xyroo AI
                </div>
                <button class="new-chat-mobile" onclick="newChat()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>

            <!-- Chat Area -->
            <div class="chat-wrapper" id="chatWrapper">
                <div class="chat-container" id="chatContainer">
                    <!-- Welcome Screen -->
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-content">
                            <h1>Xyroo AI</h1>
                            <p class="welcome-subtitle">Hai! Aku asisten pintar buatan ryuudev. Siap bantu kamu ngobrol, belajar, atau apa aja!</p>
                            
                            <div class="topic-section">
                                <h3>Topik Populer</h3>
                                <div class="suggestion-chips">
                                    <button class="chip" onclick="sendQuickMessage('Jelaskan tentang fotosintesis dengan cara yang mudah dipahami')">
                                        <div class="chip-icon green">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                                            </svg>
                                        </div>
                                        <div><strong>Fotosintesis</strong><small>Belajar biologi dasar</small></div>
                                    </button>
                                    <button class="chip" onclick="sendQuickMessage('Bantu saya memahami konsep variabel dalam pemrograman')">
                                        <div class="chip-icon blue">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                                <line x1="12" y1="17" x2="12" y2="21"></line>
                                            </svg>
                                        </div>
                                        <div><strong>Belajar Coding</strong><small>Dasar pemrograman</small></div>
                                    </button>
                                    <button class="chip" onclick="sendQuickMessage('Ceritakan sejarah Indonesia secara singkat')">
                                        <div class="chip-icon orange">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                                            </svg>
                                        </div>
                                        <div><strong>Sejarah</strong><small>Sejarah Indonesia</small></div>
                                    </button>
                                    <button class="chip" onclick="sendQuickMessage('Berikan tips belajar yang efektif')">
                                        <div class="chip-icon purple">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <circle cx="12" cy="12" r="10"></circle>
                                                <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                                            </svg>
                                        </div>
                                        <div><strong>Tips Belajar</strong><small>Teknik belajar efektif</small></div>
                                    </button>
                                    <button class="chip" onclick="sendQuickMessage('Jelaskan rumus Pythagoras dan contoh soalnya')">
                                        <div class="chip-icon red">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <line x1="18" y1="20" x2="18" y2="10"></line>
                                                <line x1="12" y1="20" x2="12" y2="4"></line>
                                                <line x1="6" y1="20" x2="6" y2="14"></line>
                                            </svg>
                                        </div>
                                        <div><strong>Matematika</strong><small>Rumus & contoh soal</small></div>
                                    </button>
                                    <button class="chip" onclick="sendQuickMessage('Ceritakan lelucon lucu dong!')">
                                        <div class="chip-icon yellow">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <circle cx="12" cy="12" r="10"></circle>
                                                <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                                                <line x1="9" y1="9" x2="9.01" y2="9"></line>
                                                <line x1="15" y1="9" x2="15.01" y2="9"></line>
                                            </svg>
                                        </div>
                                        <div><strong>Hiburan</strong><small>Cerita lucu</small></div>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-box">
                        <textarea 
                            id="userInput" 
                            placeholder="Tanyakan apa saja" 
                            rows="1"
                            oninput="autoResize(this)"
                            onkeydown="handleKeydown(event)"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">AI dapat menghasilkan kesalahan | Harap verifikasi informasi | by ryuudev</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
