<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — HACK AI</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: auto;
        }

        .reset-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius);
            padding: 32px;
            width: 100%;
            max-width: 350px;
            margin: 16px;
            box-shadow: var(--neon-glow), 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        /* corner brackets */
        .reset-box::before, .reset-box::after {
            content: '';
            position: absolute;
            width: 10px; height: 10px;
            border-color: var(--primary);
            border-style: solid;
            opacity: 0.6;
        }

        .reset-box::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
        .reset-box::after { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

        .reset-logo-text {
            font-family: var(--mono);
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: var(--neon-text);
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 10px;
        }

        .reset-title {
            font-family: var(--mono);
            font-size: 1.15rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .reset-subtitle {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 22px;
            letter-spacing: 0.3px;
        }

        .reset-subtitle::before { content: '// '; color: var(--primary); opacity: 0.5; }

        .success-box {
            text-align: center;
            padding: 12px;
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: var(--radius-sm);
            font-family: var(--mono);
            color: #22c55e;
            font-size: 0.72rem;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }

        .success-box::before { content: '// '; opacity: 0.6; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
            letter-spacing: 0.3px;
        }

        .back-link::before { content: '< '; color: var(--primary); opacity: 0.6; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="reset-box">
        <div class="reset-logo-text">HACK AI</div>
        <div class="reset-title">Reset Password</div>
        <div class="reset-subtitle">enter your new password below</div>

        <div id="resetSuccess" style="display:none;" class="success-box">
            password updated — redirecting...
        </div>

        <div id="resetFormContent">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="newPassword" placeholder="min. 6 chars">
                <div class="form-error" id="resetError"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" id="confirmPassword" placeholder="repeat password">
            </div>
            <button class="btn-primary" id="resetBtn" onclick="handleResetPassword()">Update Password</button>
        </div>

        <a class="back-link" href="/">back to hack ai</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://rkfabzgsvzwffpisounp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gU4SL_XQSmWulTN_yHw_4g_HBL6KF3V';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleResetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errEl = document.getElementById('resetError');
            const btn = document.getElementById('resetBtn');

            errEl.classList.remove('show');

            if (newPassword.length < 6) {
                errEl.textContent = 'password must be at least 6 characters';
                errEl.classList.add('show');
                return;
            }

            if (newPassword !== confirmPassword) {
                errEl.textContent = 'passwords do not match';
                errEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Updating...';

            const { error } = await sb.auth.updateUser({ password: newPassword });

            if (error) {
                errEl.textContent = error.message;
                errEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Update Password';
                return;
            }

            document.getElementById('resetFormContent').style.display = 'none';
            document.getElementById('resetSuccess').style.display = 'block';
            setTimeout(() => { window.location.href = '/'; }, 2500);
        }
    </script>
</body>
</html>
