<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Neko AI</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .reset-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
            margin: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .reset-logo {
            width: 52px; height: 52px;
            margin: 0 auto 16px;
            border-radius: 50%; overflow: hidden;
            border: 2px solid var(--primary);
            box-shadow: var(--neon-glow);
        }
        .reset-logo img { width: 100%; height: 100%; object-fit: cover; }
        .reset-title { font-size: 1.3rem; font-weight: 800; text-align: center; margin-bottom: 4px; }
        .reset-subtitle { font-size: 0.82rem; color: var(--text-secondary); text-align: center; margin-bottom: 24px; }
        .success-box {
            text-align: center; padding: 16px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 8px; color: #22c55e;
            font-size: 0.85rem; margin-bottom: 16px;
        }
        .back-link {
            display: block; text-align: center;
            margin-top: 16px; font-size: 0.82rem;
            color: var(--primary); text-decoration: none;
            cursor: pointer;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="reset-box">
        <div class="reset-logo"><img src="logo.png" alt="Neko AI"></div>
        <div class="reset-title">New Password</div>
        <div class="reset-subtitle">Enter your new password below</div>

        <div id="resetSuccess" style="display:none;" class="success-box">
            Password updated! Redirecting to chat...
        </div>

        <div id="resetFormContent">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="newPassword" placeholder="Min. 6 characters">
                <div class="form-error" id="resetError"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat password">
            </div>
            <button class="btn-primary" id="resetBtn" onclick="handleResetPassword()">Update Password</button>
        </div>

        <a class="back-link" href="/">Back to Neko AI</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleResetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errEl = document.getElementById('resetError');
            const btn = document.getElementById('resetBtn');

            errEl.classList.remove('show');

            if (newPassword.length < 6) {
                errEl.textContent = 'Password must be at least 6 characters.';
                errEl.classList.add('show');
                return;
            }

            if (newPassword !== confirmPassword) {
                errEl.textContent = 'Passwords do not match.';
                errEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Updating...';

            const { error } = await sb.auth.updateUser({ password: newPassword });

            if (error) {
                errEl.textContent = error.message;
                errEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Update Password';
                return;
            }

            document.getElementById('resetFormContent').style.display = 'none';
            document.getElementById('resetSuccess').style.display = 'block';

            setTimeout(() => { window.location.href = '/'; }, 2500);
        }
    </script>
</body>
</html>
